<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2f5e">
  <meta name="description" content="Relay Ai — Automated Dispatch &amp; Invoicing">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Relay Ai">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Relay Ai — Dispatch &amp; Invoicing</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <!-- Inline loader — shows immediately before any JS runs -->
  <div id="loader" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1b2a;">
    <div style="width:40px;height:40px;border:4px solid #ffffff33;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <div id="app"></div>

  <!-- Firebase 9 compat -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- App -->
  <script src="/js/app.js"></script>
</body>
</html>
