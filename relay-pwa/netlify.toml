# RelayAI portal configuration
[build]
  publish = "."

[functions]
  directory = "functions"

[[redirects]]
  from = "/doc/*"
  to = "/doc.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
